version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: bgd_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: customer_db
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/sql
      - ./data:/data
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: